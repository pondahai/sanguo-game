<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>三國志 — 武將名冊（M1）</title>
<style>
  :root { --bg:#1C1917; --card:#292524; --line:#44403C; --text:#E7E5E4; --dim:#A8A29E; --gold:#D8B04A; }
  * { box-sizing:border-box; margin:0; }
  body { background:var(--bg); color:var(--text); font-family:"Microsoft JhengHei","PingFang TC",sans-serif; padding:24px; }
  h1 { font-size:22px; letter-spacing:.2em; color:var(--gold); margin-bottom:4px; }
  .sub { color:var(--dim); font-size:13px; margin-bottom:16px; }
  .bar { display:flex; gap:10px; margin-bottom:18px; flex-wrap:wrap; align-items:center; }
  input, select { background:var(--card); color:var(--text); border:1px solid var(--line); border-radius:6px; padding:8px 12px; font-size:14px; font-family:inherit; }
  input { width:220px; }
  .count { color:var(--dim); font-size:13px; }
  .grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(150px,1fr)); gap:12px; }
  .card { background:var(--card); border:1px solid var(--line); border-radius:10px; padding:12px 8px 10px; text-align:center; cursor:default; }
  .card:hover { border-color:var(--gold); }
  .card .nm { font-size:16px; font-weight:bold; margin-top:6px; }
  .card .zi { font-size:12px; color:var(--dim); }
  .stat { display:grid; grid-template-columns:16px 1fr 24px; gap:5px; align-items:center; font-size:11px; margin-top:3px; padding:0 8px; }
  .stat .tk { height:5px; background:#1C1917; border-radius:3px; overflow:hidden; }
  .stat .tk i { display:block; height:100%; border-radius:3px; }
  .badge { display:inline-block; font-size:10px; border:1px solid var(--line); border-radius:4px; padding:1px 6px; color:var(--dim); margin-top:6px; }
  .badge.major { color:var(--gold); border-color:var(--gold); }
</style>
</head>
<body>
<h1>武將名冊</h1>
<p class="sub">M1 資料管線驗收頁 — 資料源:sanguo-wiki characters.py + facts;臉譜:face.js 程序生成</p>
<div class="bar">
  <input id="q" placeholder="搜尋姓名/別名…">
  <select id="tier">
    <option value="">全部</option>
    <option value="major">主要武將</option>
    <option value="minor">配角(自動數值)</option>
  </select>
  <select id="sort">
    <option value="facts">依活躍度</option>
    <option value="wu">依武力</option>
    <option value="zhi">依智力</option>
  </select>
  <span class="count" id="count"></span>
</div>
<div class="grid" id="grid"></div>
<script src="data/officers.js?v=23"></script>
<script src="js/face.js?v=23"></script>
<script src="js/wiki.js?v=23"></script>
<style>
  #wikiwin { position:fixed; right:24px; top:60px; width:min(460px,90vw); height:min(600px,80vh);
    background:var(--card); border:1px solid var(--gold); border-radius:10px; z-index:40;
    display:none; flex-direction:column; overflow:hidden; box-shadow:0 8px 30px #000C; }
  .ww-bar { display:flex; align-items:center; gap:10px; padding:8px 12px; border-bottom:1px solid var(--line); }
  .ww-bar b { color:var(--gold); } .ww-bar .spacer { flex:1; }
  .ww-bar a { color:var(--dim); font-size:12px; } .ww-bar button { padding:2px 9px; }
  #wikiwin iframe { flex:1; border:0; width:100%; background:#fff; }
</style>
<script>
var STATS = [["武","wu","#E24B4A"],["智","zhi","#378ADD"],["政","zheng","#1D9E75"],["魅","mei","#D8B04A"]];
function card(o) {
  var f = Object.assign({ wu:o.stats.wu, zhi:o.stats.zhi }, o.face);
  var life = (o.birth||"?") + "–" + (o.death||"?");
  var h = '<div class="card" data-wiki="' + o.name + '" title="點擊看列傳">' + Face.render(f, 110, o.name)
    + '<div class="nm">' + o.name + '</div>'
    + '<div class="zi">' + (o.aliases[0]||"") + (o.birth||o.death ? "　" + life : "") + '</div>';
  STATS.forEach(function(s){
    var v = o.stats[s[1]];
    h += '<div class="stat"><span>'+s[0]+'</span><span class="tk"><i style="width:'+v+'%;background:'+s[2]+'"></i></span><span>'+v+'</span></div>';
  });
  var act = (typeof o.act === "number" ? o.act : o.facts);
  h += '<span class="badge '+o.tier+'">' + (o.tier==="major"?"手調":"自動") + '・活躍 ' + act
    + (o.facts ? "" : "*") + '</span></div>';
  return h;
}
function refresh() {
  var q = document.getElementById("q").value.trim();
  var tier = document.getElementById("tier").value;
  var sort = document.getElementById("sort").value;
  var list = OFFICERS.filter(function(o){
    if (tier && o.tier !== tier) return false;
    if (!q) return true;
    return o.name.indexOf(q) >= 0 || o.aliases.some(function(a){ return a.indexOf(q) >= 0; });
  });
  list.sort(sort === "facts" ? function(a,b){ return (b.act||b.facts) - (a.act||a.facts); }
                             : function(a,b){ return b.stats[sort] - a.stats[sort]; });
  document.getElementById("grid").innerHTML = list.map(card).join("");
  document.getElementById("count").textContent = list.length + " / " + OFFICERS.length + " 人";
}
["q","tier","sort"].forEach(function(id){ document.getElementById(id).addEventListener("input", refresh); });
refresh();
</script>
</body>
</html>
