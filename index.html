<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>三國志</title>
<style>
  /* 三國志II風 16 色母盤取色: 暖黑底/焦茶框/山吹金 */
  :root { --bg:#181410; --card:#2A2014; --line:#805020; --text:#F0F0E0; --dim:#908C80; --gold:#E0C040; }
  * { box-sizing:border-box; margin:0; }
  html, body { height:100%; }
  body { background:var(--bg); color:var(--text); font-family:"Microsoft JhengHei","PingFang TC",sans-serif; display:flex; flex-direction:column; }
  #topbar { display:flex; align-items:center; gap:16px; padding:10px 16px; border-bottom:1px solid var(--line); }
  #topbar .date { font-size:18px; font-weight:bold; color:var(--gold); letter-spacing:.1em; }
  #topbar .spacer { flex:1; }
  button, .filebtn { background:var(--card); color:var(--text); border:1px solid var(--line); border-radius:6px; padding:7px 14px; font-size:14px; font-family:inherit; cursor:pointer; }
  button:hover, .filebtn:hover { border-color:var(--gold); }
  button:disabled { opacity:.4; cursor:default; }
  #main { flex:1; display:flex; min-height:0; }
  #map { flex:1; min-width:0; }
  #right { width:330px; border-left:1px solid var(--line); display:flex; flex-direction:column; min-height:0; }
  #side { flex:1; overflow-y:auto; padding:14px; }
  #side h2 { font-size:20px; color:var(--gold); } #side h2 small { font-size:12px; color:var(--dim); margin-left:8px; font-weight:normal; }
  #side h3 { font-size:14px; margin:14px 0 6px; border-top:1px solid var(--line); padding-top:10px; }
  #side h3 small { color:var(--dim); font-weight:normal; margin-left:8px; }
  .row { display:flex; justify-content:space-between; font-size:13px; padding:3px 0; }
  .row i { color:var(--dim); font-style:normal; font-size:11px; }
  .cmds { display:grid; grid-template-columns:1fr 1fr; gap:6px; }
  .cmd { display:flex; flex-direction:column; align-items:center; padding:8px 4px; }
  .cmd small { color:var(--dim); font-size:10px; margin-top:2px; }
  .offs { display:flex; flex-direction:column; gap:4px; }
  .off { display:flex; align-items:center; gap:8px; background:var(--card); border-radius:6px; padding:4px 8px; font-size:13px; }
  .off small { color:var(--dim); font-size:11px; margin-left:auto; }
  #log { height:130px; overflow-y:auto; border-top:1px solid var(--line); padding:8px 14px; font-size:12px; color:var(--dim); line-height:1.7; }
  .hint { color:var(--dim); font-size:13px; }
  #overlay { position:fixed; inset:0; background:var(--bg); display:none; align-items:center; justify-content:center; z-index:10; overflow-y:auto; }
  #modal { position:fixed; inset:0; background:rgba(0,0,0,.65); display:none; align-items:center; justify-content:center; z-index:30; }
  .dlg { background:var(--card); border:1px solid var(--gold); border-radius:12px; padding:20px 24px; max-width:420px; text-align:center; }
  .dlg h2 { color:var(--gold); font-size:18px; margin-bottom:12px; }
  .dlg label { display:block; font-size:13px; margin:8px 0; }
  .dlg input[type=number], .dlg select { background:var(--bg); color:var(--text); border:1px solid var(--line); border-radius:6px; padding:5px 8px; width:110px; font-family:inherit; }
  .dlg select { width:auto; }
  .dlg-offs { display:flex; flex-wrap:wrap; gap:6px; justify-content:center; margin:10px 0; }
  .dlg-off { display:flex; flex-direction:column; align-items:center; font-size:12px; background:var(--bg); border-radius:8px; padding:6px 8px; cursor:pointer; }
  .dlg-off small { color:var(--dim); }
  .dlg-btns { display:flex; gap:10px; justify-content:center; margin-top:14px; }
  #battle { position:fixed; inset:0; background:#181410; display:none; flex-direction:column; z-index:20; padding:10px 14px; }
  .bt-top { display:flex; gap:18px; align-items:center; padding:6px 2px 10px; }
  .bt-top b { color:var(--gold); font-size:18px; letter-spacing:.15em; }
  .bt-grid { flex:1; display:grid; gap:2px; min-height:0; }
  .cell { position:relative; border-radius:3px; min-height:0; }
  .cell.mv { outline:2px solid #63996266; outline-offset:-2px; cursor:pointer; background-image:linear-gradient(#63996233,#63996233); }
  .cell.fr { outline:2px dashed #B2302866; outline-offset:-2px; cursor:crosshair; }
  .cell .city { position:absolute; top:2px; right:4px; font-size:11px; color:#D8B04A; }
  .unit { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; cursor:pointer; line-height:1.1; }
  .unit small { font-size:10px; color:#E7E5E4; text-shadow:0 1px 2px #000; }
  .unit i { font-style:normal; font-size:9px; color:#A8A29E; }
  .unit.atk { filter:none; } .unit.def small { color:#F0B0A0; }
  .unit.usel { outline:2px solid var(--gold); border-radius:6px; }
  .unit.done { opacity:.45; }
  .bt-bottom { padding:10px 2px 4px; font-size:13px; display:flex; gap:10px; align-items:center; }
  .duel { background:var(--card); border:1px solid var(--gold); border-radius:12px; padding:22px 30px; text-align:center; min-width:420px; }
  .duel h2 { color:var(--gold); letter-spacing:.5em; margin-bottom:14px; }
  .duel-stage { display:flex; gap:26px; align-items:center; justify-content:center; }
  .duel .vs { color:var(--dim); font-size:20px; font-weight:bold; }
  .dfig { display:flex; flex-direction:column; align-items:center; gap:6px; transition:transform .5s; }
  .dfig .hp { width:110px; height:8px; background:#14100D; border-radius:4px; overflow:hidden; }
  .dfig .hp i { display:block; height:100%; background:#E24B4A; transition:width .3s; }
  .dfig.shake { animation:shake .35s; }
  .dfig.fall { transform:rotate(75deg) translateY(26px); opacity:.5; }
  @keyframes shake { 25%{transform:translateX(-7px)} 50%{transform:translateX(6px)} 75%{transform:translateX(-4px)} }
  .duel-log { margin-top:16px; font-size:14px; color:var(--text); min-height:22px; }
  .off[data-wiki] { cursor:pointer; } .off[data-wiki]:hover { outline:1px solid var(--gold); }
  #wikiwin { position:fixed; right:24px; top:60px; width:min(460px, 90vw); height:min(600px, 80vh);
    background:var(--card); border:1px solid var(--gold); border-radius:10px; z-index:40;
    display:none; flex-direction:column; overflow:hidden; box-shadow:0 8px 30px #000C; }
  .ww-bar { display:flex; align-items:center; gap:10px; padding:8px 12px; border-bottom:1px solid var(--line); }
  .ww-bar b { color:var(--gold); }
  .ww-bar .spacer { flex:1; }
  .ww-bar a { color:var(--dim); font-size:12px; }
  .ww-bar button { padding:2px 9px; }
  #wikiwin iframe { flex:1; border:0; width:100%; background:#fff; }
  .choose { text-align:center; max-width:900px; margin:auto; padding:2em 1em; }
  #novel { position:fixed; inset:0; background:var(--bg); display:none; flex-direction:column; z-index:50; }
  .nv-bar { display:flex; align-items:center; gap:10px; padding:10px 18px; border-bottom:1px solid var(--line); }
  .nv-bar b { color:var(--gold); font-size:18px; letter-spacing:.5em; }
  .nv-bar .spacer { flex:1; }
  .nv-body { flex:1; overflow-y:auto; padding:2em; max-width:42em; margin:0 auto; width:100%;
    font-family:"Noto Serif TC","PMingLiU",serif; font-size:1.05rem; line-height:2; white-space:pre-wrap; }
  .nv-wait { color:var(--dim); text-align:center; margin-top:3em; }
  .dlg input[type=text], .dlg input[type=password] { background:var(--bg); color:var(--text); border:1px solid var(--line); border-radius:6px; padding:5px 8px; font-family:inherit; }
  .choose h1 { color:var(--gold); letter-spacing:.4em; margin-bottom:6px; }
  .choose p { color:var(--dim); margin-bottom:24px; }
  .facs { display:grid; grid-template-columns:repeat(auto-fit,minmax(110px,1fr)); gap:12px; }
  .fc { background:var(--card); border:1px solid var(--line); border-radius:10px; padding:12px 6px; cursor:pointer; display:flex; flex-direction:column; align-items:center; gap:4px; }
  .fc:hover { border-color:var(--gold); }
  .fc small { color:var(--dim); }
</style>
</head>
<body>
<div id="topbar"></div>
<div id="main">
  <div id="map"></div>
  <div id="right">
    <div id="side"></div>
    <div id="log"></div>
  </div>
</div>
<div id="overlay"></div>
<div id="battle"></div>
<div id="modal"></div>
<div id="novel"></div>
<script src="data/officers.js?v=17"></script>
<script src="data/provinces.js?v=17"></script>
<script src="data/scenario_189.js?v=17"></script>
<script src="js/face.js?v=17"></script>
<script src="js/state.js?v=17"></script>
<script src="js/commands.js?v=17"></script>
<script src="js/turn.js?v=17"></script>
<script src="js/map.js?v=17"></script>
<script src="js/battle.js?v=17"></script>
<script src="js/court.js?v=17"></script>
<script src="js/wiki.js?v=17"></script>
<script src="js/novel.js?v=17"></script>
<script src="js/ui.js?v=17"></script>
<script src="js/main.js?v=17"></script>
</body>
</html>
